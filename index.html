<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#d8f1ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Fietsmaatje" />
  <meta name="application-name" content="Fietsmaatje" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="./icons/icon-192.png" />
  <title>Fietsmaatje</title>
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #fc4c02;
      --accent-dark: #c63f04;
      --accent-rgb: 252, 76, 2;
      --accent-soft: rgba(252, 76, 2, 0.14);
      --surface: rgba(255, 255, 255, 0.16);
    }

    /* HIER ZIT DE FIX: De gradiënt staat nu globaal vast op de achtergrond van de hele app */
    html, body {
      height: 100%;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d8f1ff;
      background-image: linear-gradient(
        160deg,
        #d8f1ff 0%,
        #d8f1ff 15%,
        #9edcff 45%,
        #67c7ff 100%
      );
      /* background-image: linear-gradient(160deg, #d8f1ff 0%, #9edcff 40%, #67c7ff 100%);*/   
      background-attachment: fixed;
    }

    body {
      position: relative;
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      /* Zorg dat de content netjes onder de notch begint */
      padding-top: env(safe-area-inset-top, 44px);
      padding-bottom: env(safe-area-inset-bottom);
      min-height: 100vh;
      box-sizing: border-box;
      z-index: 0;
      overflow-y: auto; /* Zorgt dat de pagina's heerlijk soepel scrollen */
      -webkit-overflow-scrolling: touch;
    }

    .pill-nav {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
      left: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.25); /* Iets meer contrast op het blauw */
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 100px;
      padding: 6px;
      display: flex;
      gap: 4px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      z-index: 100;
      box-shadow: 0 10px 30px rgba(15, 44, 90, 0.1);
    }

    .pill-nav button {
      flex: 1;
      min-height: 52px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 100px;
      padding: 10px 8px;
      font-size: 13px;
      font-weight: 600;
      color: #0f2c5a; /* Donkerblauw voor betere leesbaarheid op de navbalk */
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      line-height: 1.1;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .pill-nav button.active {
      background: #ffffff;
      color: #121212;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    /* Splash Screen Styling */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: inherit; /* Neemt de gradiënt van de body over */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #splash-screen img {
      width: 250px; /* Pas dit aan naar de grootte van jouw logo */
      height: auto;
    }

    /* --- PWA INSTALLATIE BANNER STYLING --- */
    #install-banner {
      display: none; /* Wordt aangestuurd via app.js */
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 78px); /* Zweeft perfect boven de pill-nav */
      left: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.75); /* Matcht met de navigatiebalk vibe */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      z-index: 99;
      box-shadow: 0 10px 30px rgba(15, 44, 90, 0.15);
    }

    .banner-content {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .banner-icon {
      font-size: 2rem;
      background: rgba(255, 255, 255, 0.6);
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .banner-text h4 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      color: #0f2c5a;
    }

    .banner-text p {
      margin: 2px 0 0 0;
      font-size: 0.8rem;
      color: #3a537d;
      line-height: 1.2;
    }

    #install-btn {
      width: 100%;
      padding: 14px;
      border: none;
      background: var(--accent); /* Gebruikt je eigen oranje accentkleur */
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      border-radius: 100px; /* Mooi rond net als de buttons */
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(252, 76, 2, 0.25);
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #install-btn:active {
      background: var(--accent-dark);
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <img src="splash.png" alt="Fietsmaatje Logo">
  </div>

  <div id="app"></div>

  <div id="install-banner">
    <div class="banner-content">
      <div class="banner-icon">🚴</div>
      <div class="banner-text">
        <h4>Zet Fietsmaatje op je beginscherm</h4>
        <p>Installeer de app voor snelle toegang en een optimale schermervaring.</p>
      </div>
    </div>
    <button id="install-btn">Voeg toe aan beginscherm</button>
  </div>

  <nav class="pill-nav">
    <button data-page="weer"><span>🌤</span><strong>Weer</strong></button>
    <button data-page="water"><span>💧</span><strong>Water</strong></button>
    <button data-page="planner"><span>📅</span><strong>Planner</strong></button>
    <button data-page="menu"><span>≡</span><strong>Menu</strong></button>
  </nav>

  <script>
    // Splash screen verwijderen na laden van de pagina
    window.addEventListener('load', () => {
      const splash = document.getElementById('splash-screen');
      setTimeout(() => {
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 500);
      }, 1000); // 1 seconde zichtbaar
    });
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
