<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Mijn App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      /* Voorkom dat de browser zelf scrollt of ruimte reserveert */
      overflow: hidden;
      position: fixed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #0f2c5a;
    }

    #app {
      position: fixed;
      /* Vul het hele scherm inclusief onder de statusbalk en home indicator */
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .pill-nav {
      position: fixed;
      bottom: calc(16px + env(safe-area-inset-bottom));
      left: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 100px;
      padding: 6px;
      display: flex;
      gap: 4px;
      border: 0.5px solid rgba(255, 255, 255, 0.25);
      z-index: 100;
    }

    .pill-nav button {
      flex: 1;
      background: transparent;
      border: none;
      border-radius: 100px;
      padding: 12px 8px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.75);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .pill-nav button.active {
      background: white;
      color: #1a1a2e;
    }
  </style>
</head>
<body>

  <div id="app"></div>

  <nav class="pill-nav">
    <button data-page="weer">Weer</button>
    <button data-page="water">Water</button>
    <button data-page="planner">Planner</button>
  </nav>

  <script type="module" src="app.js"></script>
</body>
</html>
