<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#d8f1ff" />
  
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Fietsmaatje" />
  <meta name="application-name" content="Fietsmaatje" />
  <link rel="manifest" href="manifest.json" />
  <title>Fietsmaatje</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #fc4c02;
      --accent-dark: #c63f04;
      --accent-rgb: 252, 76, 2;
      --accent-soft: rgba(252, 76, 2, 0.14);
      --surface: rgba(255, 255, 255, 0.16);
    }

    /* HIER ZIT DE FIX: De gradiënt staat nu globaal vast op de achtergrond van de hele app */
    html, body {
      height: 100%;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d8f1ff;
      background-image: linear-gradient(
  160deg,
  #d8f1ff 0%,
  #d8f1ff 15%,
  #9edcff 45%,
  #67c7ff 100%
);
      /* background-image: linear-gradient(160deg, #d8f1ff 0%, #9edcff 40%, #67c7ff 100%);*/   
      background-attachment: fixed;
    }

    body {
      position: relative;
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      /* Zorg dat de content netjes onder de notch begint */
      padding-top: env(safe-area-inset-top, 44px);
      padding-bottom: env(safe-area-inset-bottom);
      min-height: 100vh;
      box-sizing: border-box;
      z-index: 0;
      overflow-y: auto; /* Zorgt dat de pagina's heerlijk soepel scrollen */
      -webkit-overflow-scrolling: touch;
    }

    .pill-nav {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
      left: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.25); /* Iets meer contrast op het blauw */
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 100px;
      padding: 6px;
      display: flex;
      gap: 4px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      z-index: 100;
      box-shadow: 0 10px 30px rgba(15, 44, 90, 0.1);
    }

    .pill-nav button {
      flex: 1;
      min-height: 52px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 100px;
      padding: 10px 8px;
      font-size: 13px;
      font-weight: 600;
      color: #0f2c5a; /* Donkerblauw voor betere leesbaarheid op de navbalk */
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      line-height: 1.1;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .pill-nav button.active {
      background: #ffffff;
      color: #121212;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div id="app"></div>

  <nav class="pill-nav">
    <button data-page="weer"><span>🌤</span><strong>Weer</strong></button>
    <button data-page="water"><span>💧</span><strong>Water</strong></button>
    <button data-page="planner"><span>📅</span><strong>Planner</strong></button>
    <button data-page="menu"><span>≡</span><strong>Menu</strong></button>
  </nav>

  <script type="module" src="app.js"></script>
</body>
</html>
