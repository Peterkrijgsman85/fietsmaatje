<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#d8f1ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Fietsmaatje" />
  <meta name="application-name" content="Fietsmaatje" />
  <link rel="manifest" href="manifest.json" />
  <title>Fietsmaatje</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #fc4c02;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #d8f1ff;
      background-image: linear-gradient(160deg, #d8f1ff 0%, #d8f1ff 15%, #9edcff 45%, #67c7ff 100%);
      background-attachment: fixed;
    }

    /* Splash Screen Styling */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: inherit; /* Neemt de gradiënt van de body over */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #splash-screen img {
      width: 150px; /* Pas dit aan naar de grootte van jouw logo */
      height: auto;
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding-top: env(safe-area-inset-top, 44px);
      padding-bottom: env(safe-area-inset-bottom);
      min-height: 100vh;
      box-sizing: border-box;
      z-index: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .pill-nav {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
      left: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 100px;
      padding: 6px;
      display: flex;
      gap: 4px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      z-index: 100;
      box-shadow: 0 10px 30px rgba(15, 44, 90, 0.1);
    }

    .pill-nav button {
      flex: 1;
      min-height: 52px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 100px;
      padding: 10px 8px;
      font-size: 13px;
      font-weight: 600;
      color: #0f2c5a;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <img src="logo.png" alt="Fietsmaatje Logo">
  </div>

  <div id="app"></div>

  <nav class="pill-nav">
    <button data-page="weer"><span>🌤</span><strong>Weer</strong></button>
    <button data-page="water"><span>💧</span><strong>Water</strong></button>
    <button data-page="planner"><span>📅</span><strong>Planner</strong></button>
    <button data-page="menu"><span>≡</span><strong>Menu</strong></button>
  </nav>

  <script>
    // Splash screen verwijderen na laden van de pagina
    window.addEventListener('load', () => {
      const splash = document.getElementById('splash-screen');
      setTimeout(() => {
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 500);
      }, 1000); // 1 seconde zichtbaar
    });
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
