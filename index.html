<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f2c5a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" sizes="180x180" type="image/png" />
  <link rel="apple-touch-icon-precomposed" href="/icons/apple-touch-icon.png" sizes="180x180" />
  <link rel="icon" href="/icons/apple-touch-icon.png" type="image/png" sizes="180x180" />
  <link rel="shortcut icon" href="/icons/apple-touch-icon.png" />
  <title>Fietsmaatje</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #0f2c5a;
    }

    html.page-weer, body.page-weer {
      background: linear-gradient(160deg, #0f2c5a, #1a4a8a);
    }

    html.page-water, body.page-water {
      background: linear-gradient(160deg, #0a3d4a, #0e6b7c);
    }

    html.page-planner, body.page-planner {
      background: linear-gradient(160deg, #2d1a4a, #4a1a8a);
    }

    /* Wanneer de app als standalone gestart is, forceer volledige viewport
       en verberg browser scrollbars/werkbalken. */
    html.is-standalone, body.is-standalone {
      height: 100vh;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    /* Zorg dat standalone-modus de pagina-achtergrond behoudt achter de statusbar. */
    html.is-standalone.page-weer, body.is-standalone.page-weer {
      background: linear-gradient(160deg, #0f2c5a, #1a4a8a);
    }

    html.is-standalone.page-water, body.is-standalone.page-water {
      background: linear-gradient(160deg, #0a3d4a, #0e6b7c);
    }

    html.is-standalone.page-planner, body.is-standalone.page-planner {
      background: linear-gradient(160deg, #2d1a4a, #4a1a8a);
    }

    #app {
      position: fixed;
      /* Vul het hele scherm inclusief onder de statusbalk en home indicator */
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      /* Zorg dat content niet achter notch of home-indicator valt */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* Extra zekerheid dat content het volledige scherm vult in standalone */
    html.is-standalone #app, body.is-standalone #app {
      min-height: calc(100vh + env(safe-area-inset-bottom));
    }

    .pill-nav {
      position: fixed;
      /* Plaats zo laag mogelijk, gebruik safe-area inset en kleine offset */
      bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
      left: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 100px;
      padding: 6px;
      display: flex;
      gap: 4px;
      border: 0.5px solid rgba(255, 255, 255, 0.25);
      z-index: 100;
    }

    .pill-nav button {
      flex: 1;
      background: transparent;
      border: none;
      border-radius: 100px;
      padding: 12px 8px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.75);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .pill-nav button.active {
      background: white;
      color: #1a1a2e;
    }
  </style>
</head>
<body>

  <div id="app"></div>

  <nav class="pill-nav">
    <button data-page="weer">🌤 Weer</button>
    <button data-page="water">💧 Water</button>
    <button data-page="planner">📅 Planner</button>
  </nav>

  <script type="module" src="app.js"></script>
  <script>
    (function(){
      var isStandalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      if(isStandalone){
        document.documentElement.classList.add('is-standalone');
        document.body.classList.add('is-standalone');
      }
    })();
  </script>
</body>
</html>
